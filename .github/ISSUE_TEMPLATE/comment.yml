name: "💡 Comment (주석)"
description: "필요한 주석을 추가하거나 변경할 때 사용합니다."
title: "💡 Comment: "
labels: ["💡 Comment (주석)"]
type: Task
body:
  - type: textarea
    id: overview
    attributes:
      label: "🛠️ Issue Overview"
      placeholder: "예: 복잡한 비즈니스 로직 설명 주석 추가"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "📝 Issue Description"
      placeholder: "예: AI 응답 데이터 가공 로직에 대한 이해를 돕기 위해 단계별 설명 주석을 작성합니다."
  - type: textarea
    id: todo
    attributes:
      label: "✅ To do"
      placeholder: "예: - [ ] travelService.ts 내 핵심 로직 주석 보강"