name: "📚 Docs (문서 수정)"
description: "문서를 수정할 때 사용합니다."
title: "📚 Docs: "
labels: ["📚 Docs (문서 수정)"]
type: Task
body:
  - type: textarea
    id: overview
    attributes:
      label: "🛠️ Issue Overview"
      placeholder: "예: 스토리북 컴포넌트 명세 업데이트"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "📝 Issue Description"
      placeholder: "예: 신규 메인 카드 컴포넌트에 대한 Props 및 사용 예시를 Storybook에 기록합니다."
  - type: textarea
    id: todo
    attributes:
      label: "✅ To do"
      placeholder: "예: - [ ] Storybook 문서 작성\n- [ ] README 내 컴포넌트 구조도 수정"