name: "🎉 Init (초기 설정)"
description: "초기 환경 구축 시 사용합니다."
title: "🎉 Init: "
labels: ["🎉 Init (초기 설정)"]
type: Feature
body:
  - type: textarea
    id: overview
    attributes:
      label: "🛠️ Issue Overview"
      placeholder: "예: 프로젝트 초기 보일러플레이트 세팅"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "📝 Issue Description"
      placeholder: "예: React + Vite + TypeScript 기반 환경 설정 및 폴더 구조 생성"
  - type: textarea
    id: todo
    attributes:
      label: "✅ To do"
      placeholder: "예: - [ ] 기본 패키지 설치 (axios, tanstack-query 등)"