name: "🐛 Fix (버그 수정)"
description: "UI 결함이나 스크립트 오류를 수정할 때 사용합니다."
title: "🐛 Fix: "
labels: ["🐛 Fix (버그 수정)"]
type: Bug
body:
  - type: textarea
    id: overview
    attributes:
      label: "🛠️ Issue Overview"
      placeholder: "예: 모바일 환경에서 내비게이션 바 레이아웃 깨짐"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "📝 Issue Description"
      placeholder: "예: iOS Safari 브라우저에서 하단 탭바가 겹쳐 보이는 현상 수정"
  - type: textarea
    id: todo
    attributes:
      label: "✅ To do"
      placeholder: "예: - [ ] SafeAreaView 스타일 적용"