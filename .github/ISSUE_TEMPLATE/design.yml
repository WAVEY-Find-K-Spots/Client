name: "🎨 Design (디자인 변경)"
description: "스타일, 테마, 아이콘 등 UI 요소 변경 시 사용합니다."
title: "🎨 Design: "
labels: ["🎨 Design (디자인 변경)"]
type: Feature
body:
  - type: textarea
    id: overview
    attributes:
      label: "🛠️ Issue Overview"
      placeholder: "예: 메인 테마 컬러 시스템 변경"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "📝 Issue Description"
      placeholder: "예: 브랜드 리뉴얼에 따른 Primary 컬러 및 버튼 라운드 값 일괄 변경"
  - type: textarea
    id: todo
    attributes:
      label: "✅ To do"
      placeholder: "예: - [ ] tailwind.config.js 색상값 수정"