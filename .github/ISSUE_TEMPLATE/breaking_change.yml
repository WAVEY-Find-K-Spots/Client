name: "💥 Breaking Change (중대 변경)"
description: "커다란 아키텍처나 라이브러리 변경이 있을 때 사용합니다."
title: "💥 Breaking Change: "
labels: ["💥 Breaking Change (중대 변경)"]
type: Feature
body:
  - type: textarea
    id: overview
    attributes:
      label: "🛠️ Issue Overview"
      placeholder: "예: 전역 상태 관리 라이브러리 교체 (Recoil -> Zustand)"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "📝 Issue Description"
      placeholder: "예: 성능 최적화 및 번들 사이즈 감소를 위해 상태 관리 라이브러리를 전면 교체합니다."
  - type: textarea
    id: todo
    attributes:
      label: "✅ To do"
      placeholder: "예: - [ ] 기존 Recoil 관련 코드 제거"