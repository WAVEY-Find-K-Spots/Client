name: "🏷️ Rename (명칭 수정)"
description: "파일 또는 폴더명을 수정하거나 이동할 때 사용합니다."
title: "🏷️ Rename: "
labels: ["🏷️ Rename (명칭 수정)"]
type: Task
body:
  - type: textarea
    id: overview
    attributes:
      label: "🛠️ Issue Overview"
      placeholder: "예: 컴포넌트 폴더 구조 및 명칭 변경"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "📝 Issue Description"
      placeholder: "예: 모호한 UserList 명칭을 구체적인 MemberSelectionList로 변경하고 관련 경로 수정"
  - type: textarea
    id: todo
    attributes:
      label: "✅ To do"
      placeholder: "예: - [ ] 폴더명 변경\n- [ ] import 경로 전수 조사 및 수정"