name: "💄 Style (코드 포맷팅)"
description: "코드 변경 없이 포맷팅, 세미콜론 누락 등을 수정할 때 사용합니다."
title: "💄 Style: "
labels: ["💄 Style (코드 포맷팅)"]
type: Task
body:
  - type: textarea
    id: overview
    attributes:
      label: "🛠️ Issue Overview"
      placeholder: "예: 전체 소스코드 포맷팅 일괄 적용"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "📝 Issue Description"
      placeholder: "예: ESLint 및 Prettier 규칙 변경에 따른 미사용 변수 정리 및 따옴표 스타일 수정"
  - type: textarea
    id: todo
    attributes:
      label: "✅ To do"
      placeholder: "예: - [ ] 전체 파일 Lint Fix 실행"