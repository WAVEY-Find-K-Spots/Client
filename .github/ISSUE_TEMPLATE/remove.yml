name: "🔥 Remove (파일 삭제)"
description: "파일을 삭제하는 작업만 수행할 때 사용합니다."
title: "🔥 Remove: "
labels: ["🔥 Remove (파일 삭제)"]
type: Task
body:
  - type: textarea
    id: overview
    attributes:
      label: "🛠️ Issue Overview"
      placeholder: "예: 사용하지 않는 레거시 이미지 및 코드 제거"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "📝 Issue Description"
      placeholder: "예: 프로젝트 초기 테스트용으로 사용했던 가짜 데이터와 안 쓰는 에셋 파일들을 정리합니다."
  - type: textarea
    id: todo
    attributes:
      label: "✅ To do"
      placeholder: "예: - [ ] unused-assets 폴더 삭제\n- [ ] Mock 데이터 관련 타입 정리"